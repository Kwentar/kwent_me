name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build Notes
      - name: Install Notes dependencies
        run: cd notes/frontend && npm install
      - name: Build Notes
        run: cd notes/frontend && npm run build

      # Build Imedit
      - name: Install Imedit dependencies
        run: cd imedit/frontend && npm install
      - name: Build Imedit
        run: cd imedit/frontend && npm run build

      # Build WoWs Planner
      - name: Install WoWs Planner dependencies
        run: cd wows_planner/frontend && npm install
      - name: Build WoWs Planner
        run: cd wows_planner/frontend && npm run build

      # Build Shiptools
      - name: Install Shiptools dependencies
        run: cd shiptools/frontend && npm install
      - name: Build Shiptools
        run: cd shiptools/frontend && npm run build

      - name: Upload Notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: notes-build
          path: notes/frontend/dist/

      - name: Upload Imedit artifact
        uses: actions/upload-artifact@v4
        with:
          name: imedit-build
          path: imedit/frontend/dist/

      - name: Upload WoWs Planner artifact
        uses: actions/upload-artifact@v4
        with:
          name: wows-planner-build
          path: wows_planner/frontend/dist/

      - name: Upload Shiptools artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiptools-build
          path: shiptools/frontend/dist/

  build-and-push-images:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image coordinates
        id: meta
        run: |
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA}"
          fi
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Me service
        uses: docker/build-push-action@v6
        with:
          context: ./me
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}/me:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}/me:latest

      - name: Build and push Notes Backend
        uses: docker/build-push-action@v6
        with:
          context: ./notes/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}/notes-backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}/notes-backend:latest

      - name: Build and push WoWs Planner Backend
        uses: docker/build-push-action@v6
        with:
          context: ./wows_planner/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}/wows-planner-backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}/wows-planner-backend:latest

      - name: Build and push Shiptools Backend
        uses: docker/build-push-action@v6
        with:
          context: ./shiptools/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}/shiptools-backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}/shiptools-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-and-push-images]
    env:
      IMAGE_NAME: ${{ needs.build-and-push-images.outputs.image_name }}
      IMAGE_TAG: ${{ needs.build-and-push-images.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show deploy metadata
        run: |
          echo "IMAGE_NAME=$IMAGE_NAME"
          echo "IMAGE_TAG=$IMAGE_TAG"

      - name: Download Notes artifact
        uses: actions/download-artifact@v4
        with:
          name: notes-build
          path: notes-dist

      - name: Download Imedit artifact
        uses: actions/download-artifact@v4
        with:
          name: imedit-build
          path: imedit-dist

      - name: Download WoWs Planner artifact
        uses: actions/download-artifact@v4
        with:
          name: wows-planner-build
          path: wows-planner-dist

      - name: Download Shiptools artifact
        uses: actions/download-artifact@v4
        with:
          name: shiptools-build
          path: shiptools-dist

      - name: Update docker-compose image names
        run: |
          sed -i "s|IMAGE_NAME_PLACEHOLDER|$IMAGE_NAME|g" docker-compose.prod.yml

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.prod.yml,notes-dist/**,imedit-dist/**,wows-planner-dist/**,shiptools-dist/**,nginx.conf,html/**,emails.txt,wows_planner/backend/init.sql,wows_planner/backend/migration.sql"
          target: "/root/kwent_me"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            cd /root/kwent_me
            
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" > .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            echo "OAUTH2_PROXY_COOKIE_SECRET=${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}" >> .env
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env
            
            # Sync apps
            mkdir -p /var/www/kwent_me/notes
            cp -r notes-dist/* /var/www/kwent_me/notes/
            
            mkdir -p /var/www/kwent_me/imedit
            cp -r imedit-dist/* /var/www/kwent_me/imedit/

            mkdir -p /var/www/kwent_me/wows_planner/uploads
            chmod 777 /var/www/kwent_me/wows_planner/uploads
            cp -r wows-planner-dist/* /var/www/kwent_me/wows_planner/

            mkdir -p /var/www/kwent_me/shiptools
            cp -r shiptools-dist/* /var/www/kwent_me/shiptools/
            
            mkdir -p /var/www/kwent_me/html
            cp -r html/* /var/www/kwent_me/html/

            # Update Nginx config immediately
            cp nginx.conf /etc/nginx/sites-available/kwent_me
            nginx -t && systemctl reload nginx

            # Update docker
            mv docker-compose.prod.yml docker-compose.yml
            docker compose pull
            docker compose up -d --remove-orphans --force-recreate
            docker compose ps
            
            # Force DB migration (wait for DB start)
            sleep 10
            # 1. Run init.sql (creates missing tables)
            docker compose exec -T wows-planner-db psql -U user -d wows_planner -f /docker-entrypoint-initdb.d/init.sql
            # 2. Run migration.sql (updates existing tables)
            # We copy it into container tmp first or just use pipe? Pipe is standard but TTY might be issue.
            # Let's cp it to container since we didn't mount it in docker-compose.prod.yml
            docker cp /root/kwent_me/wows_planner/backend/migration.sql wows-planner-db:/tmp/migration.sql
            docker compose exec -T wows-planner-db psql -U user -d wows_planner -f /tmp/migration.sql
            
            docker image prune -f
